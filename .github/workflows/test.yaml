name: Tests

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  pytest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install runtime + test deps
        run: |
          pip install -U pip wheel
          pip install numpy scipy matplotlib platformdirs natsort sortedcontainers \
                       ffmpeg-python static-ffmpeg pytest

      - name: Run property tests
        run: python -m pytest tests/ -v
